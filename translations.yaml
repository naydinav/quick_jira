      QuickJira v1.0

      Лёгкое приложение в системном трее Windows для быстрого создания задач в Jira.

      Введите одну задачу в строке (или многострочную задачу), добавьте встроенные теги, проверьте результат и массово создайте задачи в Jira — без открытия браузера.

