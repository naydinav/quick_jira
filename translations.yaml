    about_title: "About QuickJira v1.0"
    about_text: |
      QuickJira v1.0

      QuickJira is a lightweight Windows system-tray app for creating Jira issues at lightning speed.

      Type one task per line (or a multi-line single task), attach inline tags, review the parsed result, and bulk-create everything in Jira — without ever opening a browser.

  ru:
    main_title: "QuickJira – Быстрый ввод задач"
    main_placeholder: |
      Введите по одной задаче в строке.
      Пример:
      Новая задача для работы @prj myproject @type task @asg me @due next week

      Поддерживаемые теги: @prj/@project/@проект, @type/@тип, @asg/@assignee/@исп/@на, @due/@срок/@когда, @start/@начало/@нач, @est/@оценка
    main_placeholder_single: |
      Введите одну задачу в свободной форме.
      Первая строка — заголовок. Остальные строки — описание (переносы строк сохраняются).
      Теги (@prj, @type, @asg, @due, @start, @est) можно указывать на любой строке.

      Пример:
      Исправить падение при входе
        Шаги для воспроизведения:
        1. Открыть приложение и подождать 30 минут
        2. Попробовать войти
        @prj MOBILE @type Bug @asg me @due next week @start tomorrow
